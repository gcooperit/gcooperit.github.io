<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background: dark rounded square matching logo badge style -->
  <rect width="64" height="64" rx="11" fill="#27241F"/>
  
  <!-- GC — hero element, large serif, cream -->
  <text x="32" y="30" text-anchor="middle"
        font-family="Georgia, 'Cormorant Garamond', 'Times New Roman', serif"
        font-weight="700"
        font-size="30"
        fill="#F8F6F2"
        dominant-baseline="central">GC</text>
  
  <!-- Accent divider -->
  <rect x="24" y="42" width="16" height="1.5" fill="#B8682E"/>
  
  <!-- IT — subtitle, small serif, orange, tracked out -->
  <text x="32" y="53" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-weight="700"
        font-size="10"
        letter-spacing="2.5"
        fill="#B8682E"
        dominant-baseline="central">IT</text>
</svg>
